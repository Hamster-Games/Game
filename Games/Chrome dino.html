<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Chrome Dino Klon</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f7f7f7; font-family: sans-serif; }
        canvas { background: #fff; border-bottom: 2px solid #535353; }
        .info { position: absolute; top: 20px; color: #535353; }
    </style>
</head>
<body>
    <div class="info">Drücke <b>Leertaste</b> zum Springen</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 200;

        // Spielvariablen
        let score = 0;
        let gameSpeed = 5;
        let isGameOver = false;
        let animationId;

        const dino = {
            x: 50,
            y: 150,
            width: 40,
            height: 40,
            color: '#535353',
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false
        };

        const obstacles = [];
        
        // Steuerung
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (isGameOver) {
                    resetGame();
                } else if (dino.grounded) {
                    dino.dy = -dino.jumpForce;
                    dino.grounded = false;
                }
            }
        });

        function spawnObstacle() {
            const size = Math.random() * (50 - 20) + 20;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - size,
                width: 20,
                height: size,
                color: '#ff4d4d'
            });
        }

        function resetGame() {
            score = 0;
            obstacles.length = 0;
            gameSpeed = 5;
            isGameOver = false;
            dino.y = 150;
            dino.dy = 0;
            animate();
        }

        let frameCount = 0;
        function animate() {
            if (isGameOver) return;

            animationId = requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dino Physik
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            if (dino.y + dino.height > canvas.height) {
                dino.y = canvas.height - dino.height;
                dino.dy = 0;
                dino.grounded = true;
            }

            // Dino zeichnen
            ctx.fillStyle = dino.color;
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            // Hindernisse verwalten
            frameCount++;
            if (frameCount % 100 === 0) {
                spawnObstacle();
                gameSpeed += 0.1; // Schwierigkeit steigern
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= gameSpeed;

                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Kollisionsprüfung
                if (
                    dino.x < obs.x + obs.width &&
                    dino.x + dino.width > obs.x &&
                    dino.y < obs.y + obs.height &&
                    dino.y + dino.height > obs.y
                ) {
                    gameOver();
                }

                // Entfernen, wenn aus dem Bild
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                }
            }

            // Score anzeigen
            ctx.fillStyle = '#535353';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 700, 30);
        }

        function gameOver() {
            isGameOver = true;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.font = '40px Arial';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText('Leertaste zum Neustart', canvas.width / 2, canvas.height / 2 + 40);
        }

        animate();
    </script>
</body>
</html>
