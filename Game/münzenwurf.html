<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Münzwurf-Spiel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .game {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      color: gold;
    }

    .money {
      font-size: 2rem;
      margin: 20px 0;
    }

    input {
      padding: 10px;
      width: 120px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .result {
      margin-top: 20px;
      font-size: 1.2rem;
      min-height: 30px;
    }

    .goal {
      margin-top: 15px;
      color: lightgreen;
    }

    .reset {
      background: crimson;
      color: white;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div class="game">
  <h1>🪙 Münzwurf-Spiel</h1>

  <div class="money" id="money">100€</div>

  <p>Setze einen Betrag:</p>

  <input type="number" id="bet" min="1" value="10">

  <br>

  <button onclick="flipCoin()">Münze werfen</button>
  <button class="reset" onclick="resetGame()">Neu starten</button>

  <div class="result" id="result"></div>

  <div class="goal">
    Ziel: 10.000€
  </div>
</div>

<script>
  // Spielstand laden
  let money = localStorage.getItem("coinGameMoney");

  if (money === null) {
    money = 100;
  } else {
    money = parseInt(money);
  }

  updateDisplay();

  function flipCoin() {
    const betInput = document.getElementById("bet");
    const resultText = document.getElementById("result");

    let bet = parseInt(betInput.value);

    if (isNaN(bet) || bet <= 0) {
      resultText.innerHTML = "⚠ Bitte gültigen Betrag eingeben!";
      return;
    }

    if (bet > money) {
      resultText.innerHTML = "❌ Du hast nicht genug Geld!";
      return;
    }

    // Münzwurf
    const win = Math.random() < 0.5;

    if (win) {
      money += bet;
      resultText.innerHTML = `🎉 Gewonnen! +${bet}€`;
    } else {
      money -= bet;
      resultText.innerHTML = `💀 Verloren! -${bet}€`;
    }

    // Speichern
    localStorage.setItem("coinGameMoney", money);

    updateDisplay();

    // Gewonnen
    if (money >= 10000) {
      resultText.innerHTML =
        "🏆 DU HAST GEWONNEN! 10.000€ erreicht!";
    }

    // Verloren
    if (money <= 0) {
      resultText.innerHTML =
        "☠ GAME OVER! Du bist pleite.";
    }
  }

  function updateDisplay() {
    document.getElementById("money").innerHTML = money + "€";
  }

  function resetGame() {
    if (confirm("Spiel wirklich zurücksetzen?")) {
      money = 100;
      localStorage.setItem("coinGameMoney", money);
      updateDisplay();
      document.getElementById("result").innerHTML =
        "🔄 Spiel zurückgesetzt!";
    }
  }
</script>

</body>
</html>
