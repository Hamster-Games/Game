<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hamster Jump</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Verhindert Scrollen beim Spielen */
        }
        canvas {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 400;
canvas.height = 600;

let score = 0;
let gameOver = false;
const gravity = 0.4;

const hamster = {
    x: 180,
    y: 300,
    width: 40,
    height: 40,
    vx: 0,
    vy: 0,
    jumpStrength: -12,
    color: '#EDBA8B'
};

let platforms = [];
let birds = [];

function initGame() {
    platforms = [];
    birds = [];
    score = 0;
    gameOver = false;
    hamster.y = 300;
    hamster.vy = 0;
    
    for (let i = 0; i < 7; i++) {
        platforms.push({
            x: Math.random() * (canvas.width - 60),
            y: i * 90,
            width: 65,
            height: 15
        });
    }
}

// STEUERUNG: Tastatur (Pfeiltasten + A/D)
window.addEventListener('keydown', (e) => {
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') hamster.vx = -6;
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') hamster.vx = 6;
    if (e.code === 'Space' && gameOver) initGame();
});

window.addEventListener('keyup', (e) => {
    if (['a', 'A', 'd', 'D', 'ArrowLeft', 'ArrowRight'].includes(e.key)) hamster.vx = 0;
});

// STEUERUNG: Touch (Mobilgeräte)
canvas.addEventListener('touchstart', (e) => {
    if (gameOver) {
        initGame();
        return;
    }
    const touchX = e.touches[0].clientX - canvas.offsetLeft;
    if (touchX < canvas.width / 2) hamster.vx = -6;
    else hamster.vx = 6;
}, false);

canvas.addEventListener('touchend', () => {
    hamster.vx = 0;
}, false);

function spawnBird() {
    if (Math.random() < 0.01 && birds.length < 2) {
        birds.push({
            x: -50,
            y: Math.random() * 200,
            speed: 2 + Math.random() * 3,
            size: 30
        });
    }
}

function drawHamster() {
    ctx.fillStyle = hamster.color;
    // Hamster-Körper
    ctx.beginPath();
    ctx.ellipse(hamster.x + 20, hamster.y + 20, 18, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    // Ohren
    ctx.fillStyle = '#D2A679';
    ctx.beginPath();
    ctx.arc(hamster.x + 10, hamster.y + 10, 8, 0, Math.PI * 2);
    ctx.arc(hamster.x + 30, hamster.y + 10, 8, 0, Math.PI * 2);
    ctx.fill();
}

function drawBird(bird) {
    ctx.fillStyle = '#FF4500'; // Roter Stadt-Vogel
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size/2, 0, Math.PI * 2);
    ctx.fill();
    // Schnabel
    ctx.fillStyle = 'yellow';
    ctx.fillRect(bird.x + 10, bird.y - 2, 8, 4);
}

function update() {
    if (gameOver) return;

    hamster.vy += gravity;
    hamster.y += hamster.vy;
    hamster.x += hamster.vx;

    // Endlos-Laufen (Links/Rechts)
    if (hamster.x > canvas.width) hamster.x = -hamster.width;
    if (hamster.x < -hamster.width) hamster.x = canvas.width;

    // Scrolling
    if (hamster.y < canvas.height / 2) {
        let diff = canvas.height / 2 - hamster.y;
        hamster.y = canvas.height / 2;
        score++;

        platforms.forEach(p => {
            p.y += diff;
            if (p.y > canvas.height) {
                p.y = 0;
                p.x = Math.random() * (canvas.width - 60);
            }
        });

        birds.forEach(b => b.y += diff);
    }

    // Plattform-Kollision
    if (hamster.vy > 0) {
        platforms.forEach(p => {
            if (hamster.x + 30 > p.x && hamster.x + 10 < p.x + p.width &&
                hamster.y + 40 > p.y && hamster.y + 40 < p.y + p.height + 10) {
                hamster.vy = hamster.jumpStrength;
            }
        });
    }

    // Vögel bewegen & Kollision
    spawnBird();
    birds.forEach((b, index) => {
        b.x += b.speed;
        // Kollisions-Check
        let dx = (hamster.x + 20) - b.x;
        let dy = (hamster.y + 20) - b.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 25) gameOver = true;

        if (b.x > canvas.width + 100) birds.splice(index, 1);
    });

    if (hamster.y > canvas.height) gameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Stadt-Vibe: Wolken-Ersatz
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.font = "bold 40px Arial";
    ctx.fillText("Hamster Jump", 80, 200);

    // Plattformen (Gebäude-Stil)
    ctx.fillStyle = "#333";
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = "#555";
        ctx.fillRect(p.x + 5, p.y + 2, 10, 5); // Kleine Fenster-Deko
    });

    birds.forEach(drawBird);
    drawHamster();

    // UI
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(`Punkte: ${score}`, 20, 40);

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "30px Arial";
        ctx.fillText("HAMSTER ABGESTÜRZT!", canvas.width/2, canvas.height/2);
        ctx.font = "20px Arial";
        ctx.fillText("Tippen oder Leertaste", canvas.width/2, canvas.height/2 + 50);
        ctx.textAlign = "start";
    }

    update();
    requestAnimationFrame(draw);
}

initGame();
draw();
</script>
</body>
</html>
