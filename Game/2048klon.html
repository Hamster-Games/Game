<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Klon</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --tile-empty: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: var(--bg-color);
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 20px;
        }

        .score-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: var(--grid-bg);
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            text-align: center;
            box-shadow: 0 4px #9e8e7e;
        }

        .score-label { font-size: 13px; text-transform: uppercase; }
        .score-value { font-size: 20px; font-weight: bold; }

        /* Das 3D Spielfeld */
        .game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background: var(--grid-bg);
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            transform: perspective(1000px) rotateX(10deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), 0 10px 10px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .tile {
            width: 100%;
            height: 100%;
            background: var(--tile-empty);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            color: var(--text-dark);
            position: relative;
            transition: transform 0.1s ease-in-out;
            /* 3D Effekt für Kacheln */
            box-shadow: inset 0 -4px rgba(0,0,0,0.1);
        }

        /* Farben für verschiedene Werte */
        .tile[data-value="2"] { background: #eee4da; }
        .tile[data-value="4"] { background: #ede0c8; }
        .tile[data-value="8"] { background: #f2b179; color: var(--text-light); }
        .tile[data-value="16"] { background: #f59563; color: var(--text-light); }
        .tile[data-value="32"] { background: #f67c5f; color: var(--text-light); }
        .tile[data-value="64"] { background: #f65e3b; color: var(--text-light); }
        .tile[data-value="128"] { background: #edcf72; color: var(--text-light); font-size: 30px; }
        .tile[data-value="256"] { background: #edcc61; color: var(--text-light); font-size: 30px; }
        .tile[data-value="512"] { background: #edc850; color: var(--text-light); font-size: 30px; }
        .tile[data-value="1024"] { background: #edc53f; color: var(--text-light); font-size: 25px; }
        .tile[data-value="2048"] { background: #edc22e; color: var(--text-light); font-size: 25px; }

        .game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(238, 228, 218, 0.73);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }

        button {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px #6d5d4e;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px #6d5d4e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048 <small style="font-size: 14px; display: block;">3D Edition</small></h1>
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div id="score" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Rekord</div>
                <div id="best" class="score-value">0</div>
            </div>
        </div>
    </div>

    <div class="game-container">
        <div id="game-over" class="game-over">
            <h2>Game Over!</h2>
            <button onclick="resetGame()">Neu starten</button>
        </div>
        <div class="grid" id="grid">
            </div>
    </div>

    <p>Benutze die <b>Pfeiltasten</b> zum Spielen.</p>

    <script>
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('bestScore') || 0;
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');

        function initGame() {
            grid = Array(16).fill(0);
            score = 0;
            bestElement.innerText = best;
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function addRandomTile() {
            let emptyTiles = grid.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (emptyTiles.length > 0) {
                let randomIdx = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                grid[randomIdx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateBoard() {
            gridElement.innerHTML = '';
            grid.forEach(value => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (value > 0) {
                    tile.innerText = value;
                    tile.setAttribute('data-value', value);
                }
                gridElement.appendChild(tile);
            });
            scoreElement.innerText = score;
            if (score > best) {
                best = score;
                localStorage.setItem('bestScore', best);
                bestElement.innerText = best;
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(direction) {
            let oldGrid = [...grid];
            for (let i = 0; i < 4; i++) {
                let row = [];
                for (let j = 0; j < 4; j++) {
                    if (direction === 'left' || direction === 'right') row.push(grid[i * 4 + j]);
                    else row.push(grid[j * 4 + i]);
                }

                if (direction === 'right' || direction === 'down') row.reverse();
                row = slide(row);
                if (direction === 'right' || direction === 'down') row.reverse();

                for (let j = 0; j < 4; j++) {
                    if (direction === 'left' || direction === 'right') grid[i * 4 + j] = row[j];
                    else grid[j * 4 + i] = row[j];
                }
            }

            if (JSON.stringify(oldGrid) !== JSON.stringify(grid)) {
                addRandomTile();
                updateBoard();
                checkGameOver();
            }
        }

        function checkGameOver() {
            if (!grid.includes(0)) {
                // Hier könnte man noch prüfen, ob Züge möglich sind. 
                // Für den Klon belassen wir es bei der "Voll"-Prüfung für Einfachheit.
                let canMove = false;
                for(let i=0; i<16; i++) {
                    if((i%4 < 3 && grid[i] === grid[i+1]) || (i < 12 && grid[i] === grid[i+4])) canMove = true;
                }
                if(!canMove) document.getElementById('game-over').style.display = 'flex';
            }
        }

        function resetGame() {
            document.getElementById('game-over').style.display = 'none';
            initGame();
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'a') move('left');
            if (e.key === 'd') move('right');
            if (e.key === 'w') move('up');
            if (e.key === 's') move('down');
        });

        initGame();
    </script>
</body>
</html>
