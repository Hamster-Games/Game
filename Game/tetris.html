<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tetris mit Vorschau</title>
    <style>
        body { background: #202028; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .game-container { display: flex; gap: 20px; align-items: flex-start; }
        canvas { border: solid 2px #fff; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #nextCanvas { background-color: #111; border: solid 2px #555; }
        .stats-panel { display: flex; flex-direction: column; gap: 10px; }
        .stat-box { font-size: 18px; background: #333; padding: 10px; border-radius: 5px; min-width: 120px; }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="game-container">
        <div>
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="stats-panel">
            <div class="stat-box">
                <h3>Vorschau</h3>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
            <div class="stat-box">
                <h3>Score</h3>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <h3>Highscore</h3>
                <div id="highscore">0</div>
            </div>
            <div style="font-size: 12px; color: #777; margin-top: 10px;">
                WASD: Bewegen/Soft Drop<br>
                Leertaste: Drehen<br>
                Q/E: Drehen
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        function draw() {
            // Hauptfeld zeichnen
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            // Vorschau zeichnen
            nextContext.fillStyle = '#111';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            // Zentrierung in der Vorschau (ca. 1 Einheit Offset)
            drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            let highscore = localStorage.getItem('tetris_highscore') || 0;
            if (player.score > highscore) {
                highscore = player.score;
                localStorage.setItem('tetris_highscore', highscore);
            }
            document.getElementById('highscore').innerText = highscore;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0
        };

        // Steuerung: WASD + Pfeiltasten + Leertaste
        document.addEventListener('keydown', event => {
            // Nach Links (A oder Pfeil links)
            if (event.keyCode === 65 || event.keyCode === 37) playerMove(-1);
            // Nach Rechts (D oder Pfeil rechts)
            else if (event.keyCode === 68 || event.keyCode === 39) playerMove(1);
            // Nach Unten (S oder Pfeil unten)
            else if (event.keyCode === 83 || event.keyCode === 40) playerDrop();
            // Drehen (W, Pfeil hoch oder Leertaste)
            else if (event.keyCode === 87 || event.keyCode === 38 || event.keyCode === 32) playerRotate(1);
            // Optional: Q zum Linksdrehen
            else if (event.keyCode === 81) playerRotate(-1);
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
