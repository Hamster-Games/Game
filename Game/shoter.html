<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
        }

        .health-bar {
            width: 250px;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .fill { height: 100%; transition: width 0.1s; border-radius: 3px; }
        #player-fill { background: #00d2ff; width: 100%; }

        /* Bot-Status Liste */
        #bot-stats { margin-top: 20px; font-size: 0.8em; }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

#menu {
    position: absolute;
    top: 50%; 
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(10, 10, 10, 0.98);
    
    /* GRÖSSE DES MENÜS */
    width: 500px;
    height: 600px; /* Feste Höhe, um Platz zu schaffen */
    
    display: flex;
    flex-direction: column;
    justify-content:空间-between; /* Verteilt Inhalte nach oben und unten */
    padding: 40px;
    border-radius: 25px;
    border: 2px solid #444;
    color: white;
    box-shadow: 0 0 50px rgba(255, 0, 85, 0.3);
}

/* Der Bereich für die Schieberegler ganz oben */
.settings-container {
    flex-grow: 0;
}

/* Der Button ganz unten */
button {
    margin-top: auto; /* Drückt den Button an den untersten Rand */
    padding: 20px;
    font-size: 22px;
    background: #ff0055;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* Das hier ist der Trick: Ein unsichtbarer Abstandshalter in der Mitte */
.spacer {
    height: 200px; /* Dieser Bereich liegt genau da, wo die Maus spawnt */
}

        button:hover { background: #ff4d88; transform: scale(1.02); }
        .val-display { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui">
        <div>PLAYER HP</div>
        <div class="health-bar"><div id="player-fill" class="fill"></div></div>
        <div id="bot-stats">BOTS ÜBRIG: <span id="bots-count">0</span></div>
    </div>

<div id="menu">
    <div class="settings-container">
        <h1 id="status-text">BOT SWARM 3D</h1>
        
        <div class="setting-group">
            <label>Bot Anzahl: <span id="count-val" class="val-display">3</span></label>
            <input type="range" id="count-slider" min="1" max="10" value="3">
        </div>

        <div class="setting-group">
            <label>Schwierigkeit: <span id="diff-val" class="val-display">Stufe 3</span></label>
            <input type="range" id="diff-slider" min="1" max="10" value="3">
        </div>
    </div>

    <div class="spacer"></div>

    <button id="start-btn">KAMPF STARTEN</button>
</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 80);
        light.position.set(0, 15, 0);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x202020));

        const grid = new THREE.GridHelper(100, 40, 0x444444, 0x111111);
        scene.add(grid);

        // --- GAME STATE ---
        let playerHP = 100, gameActive = false;
        let bots = [];
        let bullets = [];
        
        // Einstellungs-Variablen
        let botDamage = 5;
        let botFireRate = 60;
        let botAmount = 3;

        // UI Updates
        const countSlider = document.getElementById('count-slider');
        const diffSlider = document.getElementById('diff-slider');
        
        countSlider.oninput = () => {
            document.getElementById('count-val').innerText = countSlider.value;
            botAmount = parseInt(countSlider.value);
        };
        diffSlider.oninput = () => {
            document.getElementById('diff-val').innerText = "Stufe " + diffSlider.value;
            botDamage = 2 + (diffSlider.value * 2);
            botFireRate = Math.max(10, 90 - (diffSlider.value * 8));
        };

        const controls = new PointerLockControls(camera, document.body);
        const startBtn = document.getElementById('start-btn');
        const menu = document.getElementById('menu');

        startBtn.onclick = () => {
            resetGame();
            controls.lock();
        };

        controls.addEventListener('lock', () => { menu.style.display = 'none'; gameActive = true; });
        controls.addEventListener('unlock', () => { menu.style.display = 'block'; gameActive = false; });

        window.addEventListener('mousedown', () => {
            if (controls.isLocked && gameActive) shoot(camera, true);
        });

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function shoot(source, isPlayer) {
            const dir = new THREE.Vector3();
            if(isPlayer) {
                camera.getWorldDirection(dir);
            } else {
                dir.subVectors(camera.position, source.position).normalize();
            }

            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshBasicMaterial({ color: isPlayer ? 0x00d2ff : 0xff0055 })
            );
            b.position.copy(source.position);
            b.userData = { velocity: dir.multiplyScalar(0.6), isPlayer: isPlayer, life: 120 };
            scene.add(b);
            bullets.push(b);
        }

        function createBot(index) {
            const angle = (index / botAmount) * Math.PI * 2;
            const radius = 15 + Math.random() * 5;
            
            const botMesh = new THREE.Mesh(
                new THREE.OctahedronGeometry(1, 0),
                new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 0.5 })
            );
            
            botMesh.position.set(Math.cos(angle) * radius, 1.5, Math.sin(angle) * radius);
            botMesh.userData = { 
                hp: 50, 
                shootTimer: Math.random() * botFireRate // Random Offset für Schüsse
            };
            
            scene.add(botMesh);
            return botMesh;
        }

        function resetGame() {
            playerHP = 100;
            document.getElementById('player-fill').style.width = "100%";
            
            // Alte Bots entfernen
            bots.forEach(b => scene.remove(b));
            bullets.forEach(b => scene.remove(b));
            bots = [];
            bullets = [];

            // Neue Bots spawnen
            for(let i=0; i < botAmount; i++) {
                bots.push(createBot(i));
            }
            
            document.getElementById('bots-count').innerText = bots.length;
            camera.position.set(0, 1.6, 0);
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return;

            // Player Movement
            if (keys['KeyW']) controls.moveForward(0.12);
            if (keys['KeyS']) controls.moveForward(-0.12);
            if (keys['KeyA']) controls.moveRight(-0.12);
            if (keys['KeyD']) controls.moveRight(0.12);

            // Bots Logik
            bots.forEach((bot, index) => {
                // Schweben & Drehen
                bot.position.y = 1.5 + Math.sin(Date.now() * 0.002 + index) * 0.3;
                bot.rotation.y += 0.02;

                // Zum Spieler bewegen
                const toPlayer = new THREE.Vector3().subVectors(camera.position, bot.position).normalize();
                if(bot.position.distanceTo(camera.position) > 5) {
                    bot.position.x += toPlayer.x * 0.03;
                    bot.position.z += toPlayer.z * 0.03;
                }

                // Schießen
                bot.userData.shootTimer++;
                if (bot.userData.shootTimer >= botFireRate) {
                    shoot(bot, false);
                    bot.userData.shootTimer = 0;
                }
            });

            // Projektile
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity);
                b.userData.life--;

                if (b.userData.isPlayer) {
                    // Check Kollision mit ALLEN Bots
                    bots.forEach((bot, botIdx) => {
                        if (b.position.distanceTo(bot.position) < 1.2) {
                            bot.userData.hp -= 25;
                            scene.remove(b);
                            bullets.splice(i, 1);
                            
                            if(bot.userData.hp <= 0) {
                                scene.remove(bot);
                                bots.splice(botIdx, 1);
                                document.getElementById('bots-count').innerText = bots.length;
                            }
                        }
                    });
                } else {
                    if (b.position.distanceTo(camera.position) < 0.8) {
                        playerHP -= botDamage;
                        document.getElementById('player-fill').style.width = Math.max(0, playerHP) + "%";
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                }
                if (b.userData.life <= 0 && bullets[i]) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            // Win/Loss Check
            if (playerHP <= 0) {
                gameActive = false;
                document.getElementById('status-text').innerText = "DU WURDEST ÜBERRANNT!";
                controls.unlock();
            } else if (bots.length === 0) {
                gameActive = false;
                document.getElementById('status-text').innerText = "ALLE BOTS ELIMINIERT!";
                controls.unlock();
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
