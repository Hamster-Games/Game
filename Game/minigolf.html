<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigolf: Multi-Stats</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        #ui { color: white; padding: 15px; text-align: center; }
        #stats-container { display: flex; gap: 15px; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 12px; margin-top: 5px; border: 1px solid #444; }
        .stat-box { font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .highlight { color: #f1c40f; font-weight: bold; display: block; font-size: 1.4em; }
        canvas { border: 5px solid #34495e; background: #2ecc71; cursor: crosshair; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>⛳ Minigolf</h1>
        <div id="stats-container">
            <div class="stat-box">Level<span id="level" class="highlight">1</span></div>
            <div class="stat-box">Schläge<span id="strokes" class="highlight">0</span></div>
            <div class="stat-box">Rekord (Lvl)<span id="high-level" class="highlight">1</span></div>
            <div class="stat-box">Beste Runde<span id="best-strokes" class="highlight">-</span></div>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, World, Bodies, Vector, Events, Body } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 0;

        const width = 800, height = 600;
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width, height, wireframes: false, background: '#2ecc71' }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        let ball, hole, levelCount = 1, strokeCount = 0, isDragging = false, currentMousePos = { x: 0, y: 0 };

        // --- Speichersystem ---
        let highLevel = localStorage.getItem('minigolf_high_level') || 1;
        let bestStrokes = localStorage.getItem('minigolf_best_strokes') || Infinity;

        function displayStats() {
            document.getElementById('high-level').innerText = highLevel;
            document.getElementById('best-strokes').innerText = bestStrokes === Infinity ? "---" : bestStrokes;
        }
        displayStats();

        function checkRecords() {
            // Level Rekord
            if (levelCount > highLevel) {
                highLevel = levelCount;
                localStorage.setItem('minigolf_high_level', highLevel);
            }
            // Schläge Rekord (für das gerade beendete Level)
            if (strokeCount < bestStrokes) {
                bestStrokes = strokeCount;
                localStorage.setItem('minigolf_best_strokes', bestStrokes);
            }
            displayStats();
        }

        function createLevel() {
            World.clear(world);
            strokeCount = 0; // Schläge für neues Level zurücksetzen
            document.getElementById('strokes').innerText = strokeCount;
            document.getElementById('level').innerText = levelCount;

            const wallOpt = { isStatic: true, render: { fillStyle: '#34495e' }, restitution: 0.8 };
            World.add(world, [
                Bodies.rectangle(width/2, 10, width, 20, wallOpt),
                Bodies.rectangle(width/2, height-10, width, 20, wallOpt),
                Bodies.rectangle(10, height/2, 20, height, wallOpt),
                Bodies.rectangle(width-10, height/2, 20, height, wallOpt)
            ]);

            // Hindernisse generieren
            for (let i = 0; i < Math.min(3 + levelCount, 10); i++) {
                let x = Math.random() * (width - 300) + 150;
                let y = Math.random() * (height - 300) + 150;
                let w = Math.random() > 0.5 ? 20 : 80;
                let h = w === 20 ? 80 : 20;
                World.add(world, Bodies.rectangle(x, y, w, h, wallOpt));
            }

            hole = Bodies.circle(width - 80, height / 2, 18, { isSensor: true, isStatic: true, render: { fillStyle: '#111' } });
            ball = Bodies.circle(80, height / 2, 10, { frictionAir: 0.04, restitution: 0.6, render: { fillStyle: 'white' } });
            World.add(world, [hole, ball]);
        }

        // Steuerung & Zeichnen
        const canvas = render.canvas;
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const m = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            if (Vector.magnitude(Vector.sub(ball.position, m)) < 30 && ball.speed < 0.3) isDragging = true;
        });

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            currentMousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            const force = Vector.sub(ball.position, currentMousePos);
            const strength = 0.00015, max = 0.012;
            let f = { x: force.x * strength, y: force.y * strength };
            if (Vector.magnitude(f) > max) {
                const a = Math.atan2(f.y, f.x);
                f = { x: Math.cos(a) * max, y: Math.sin(a) * max };
            }
            Body.applyForce(ball, ball.position, f);
            strokeCount++;
            document.getElementById('strokes').innerText = strokeCount;
            isDragging = false;
        });

        Events.on(render, 'afterRender', () => {
            if (isDragging) {
                const ctx = render.context;
                ctx.beginPath();
                ctx.moveTo(ball.position.x, ball.position.y);
                ctx.lineTo(currentMousePos.x, currentMousePos.y);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.lineWidth = 3; ctx.setLineDash([5, 5]);
                ctx.stroke(); ctx.setLineDash([]);
            }
        });

        Events.on(engine, 'afterUpdate', () => {
            if (Vector.magnitude(Vector.sub(ball.position, hole.position)) < 15 && ball.speed < 1.2) {
                checkRecords(); // Speichern bevor das Level wechselt
                levelCount++;
                createLevel();
            }
        });

        createLevel();
    </script>
</body>
</html>
