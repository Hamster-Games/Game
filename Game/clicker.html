<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Level Clicker</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container { text-align: center; transition: opacity 0.5s; }

        #score {
            font-size: 5rem;
            margin: 0;
            transition: all 0.3s;
        }

        .stat {
            font-size: 1.2rem;
            color: #888;
            margin: 5px;
        }

        .highlight { font-weight: bold; }

        .click-btn {
            background: none;
            padding: 30px 60px;
            font-size: 2.5rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .click-btn:active { transform: scale(0.92); }

        #win-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #reset-btn {
            margin-top: 30px;
            background: none;
            border: 1px solid #444;
            color: #666;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">0</div>
        <div class="stat">Level: <span id="lvl-display" class="highlight">1</span></div>
        <div class="stat">Multiplikator: <span id="mult-display" class="highlight">x1</span></div>
        <div class="stat">Nächstes Level bei: <span id="next-display" class="highlight">100</span></div>
        <br>
        <button id="main-button" class="click-btn" onclick="addClick()">KLICK!</button>
    </div>

    <div id="win-screen">
        <h1 style="color: gold; font-size: 4rem;">LEGENDE!</h1>
        <p>Du hast Level 100 erreicht!</p>
        <button id="reset-btn" onclick="resetScore()">Neustart</button>
    </div>

    <script>
        // Daten laden
        let score = Number(localStorage.getItem('progClicker_score')) || 0;
        let level = Number(localStorage.getItem('progClicker_level')) || 1;
        let nextLevelAt = Number(localStorage.getItem('progClicker_next')) || 100;

        const colors = ['#0cf', '#f0f', '#0f8', '#ff0', '#f40', '#f04', '#a0f'];

        function updateUI() {
            // Farbe basierend auf Level
            let color = colors[level % colors.length];

            // UI Texte
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('lvl-display').innerText = level;
            document.getElementById('mult-display').innerText = "x" + level;
            document.getElementById('next-display').innerText = Math.floor(nextLevelAt);

            // Styling
            document.getElementById('score').style.color = color;
            document.getElementById('score').style.textShadow = `0 0 20px ${color}`;
            document.getElementById('lvl-display').style.color = color;
            
            const btn = document.getElementById('main-button');
            btn.style.borderColor = color;
            btn.style.color = color;
            btn.style.boxShadow = `0 0 15px ${color}`;

            // Sieg prüfen
            if (level >= 100) {
                document.getElementById('win-screen').style.display = "flex";
                document.getElementById('game-container').style.opacity = "0";
            }
        }

        function addClick() {
            // Man bekommt Punkte entsprechend dem aktuellen Level
            score += level;

            // Prüfen, ob Level-Up
            if (score >= nextLevelAt) {
                level++;
                // DEINE FORMEL: 100 + (Level * 0.5) wird auf die aktuelle Hürde addiert
                let upgradeAmount = 100 + (level * 0.5);
                nextLevelAt += upgradeAmount;
                
                // Kleiner visueller Effekt bei Level-Up
                document.body.style.backgroundColor = "#333";
                setTimeout(() => document.body.style.backgroundColor = "#1a1a1a", 100);
            }

            save();
            updateUI();
        }

        function save() {
            localStorage.setItem('progClicker_score', score);
            localStorage.setItem('progClicker_level', level);
            localStorage.setItem('progClicker_next', nextLevelAt);
        }

        function resetScore() {
            localStorage.clear();
            score = 0;
            level = 1;
            nextLevelAt = 100;
            document.getElementById('win-screen').style.display = "none";
            document.getElementById('game-container').style.opacity = "1";
            updateUI();
        }

        // Start
        updateUI();
    </script>
</body>
</html>
